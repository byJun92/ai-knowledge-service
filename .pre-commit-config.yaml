minimum_pre_commit_version: "4.0.0"

default_install_hook_types:
  - pre-commit
  - pre-push

repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: Ruff lint
        entry: uv run ruff check .
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: ruff-format-check
        name: Ruff format check
        entry: uv run ruff format --check .
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: mypy
        name: mypy strict
        entry: uv run mypy src tests
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: pytest
        name: pytest
        entry: uv run pytest --cov=ai_knowledge_service
        language: system
        pass_filenames: false
        stages: [pre-push]